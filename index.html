<!DOCTYPE html>
<html>
<head>
    <title>Online Voting System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<h1>Online Voting System</h1>

<!-- ================= DASHBOARD ================= -->
<div class="section" id="dashboard">
    <h2>Login</h2>

    <input id="loginEmail" placeholder="Email">
    <br>
    <input id="loginPass" type="password" placeholder="Password">
    <br>

    <select id="loginRole">
        <option value="voter">Voter</option>
        <option value="candidate">Candidate</option>
    </select><br>

    <button onclick="login()">Login</button>
    <button onclick="show('register')">Register</button>
</div>

<!-- ================= REGISTER ================= -->
<div class="section" id="register" style="display:none;">
    <h2>Register</h2>

    <input id="rname" placeholder="Full Name">
    <br>
    <input id="remail" placeholder="Email">
    <br>
    <input id="rpass" type="password" placeholder="Password">
    <br>

    <select id="rrole">
        <option value="voter">Voter</option>
        <option value="candidate">Candidate</option>
    </select><br>

    <button onclick="register()">Submit</button>
    <button onclick="show('dashboard')">Back</button>
</div>

<!-- ================= VOTER PANEL ================= -->
<div class="section" id="voter" style="display:none;">
    <h2>Voter Panel</h2>
    <div id="candidateList"></div>
    <button onclick="logout()">Logout</button>
</div>

<!-- ================= CANDIDATE PANEL ================= -->
<div class="section" id="candidate" style="display:none;">
    <h2>Candidate Panel</h2>

    <textarea id="manifesto" placeholder="Enter your manifesto here..." 
        style="width:90%; height:100px;"></textarea><br>

    <button onclick="saveManifesto()">Save Manifesto</button>
    <p id="candMsg"></p>

    <button onclick="logout()">Logout</button>
</div>

<!-- ================= ADMIN PANEL ================= -->
<div class="section" id="adminPanel" style="display:none;">
    <h2>Admin Dashboard</h2>
    <h3>Election Schedule</h3>

    <label>Start Date & Time:</label>
    <input type="datetime-local" id="startDate">

    <label>End Date & Time:</label>
    <input type="datetime-local" id="endDate">

    <button onclick="saveElectionSchedule()">Save Schedule</button>

    <hr>


    <div id="adminResults"></div>

    <hr>
    <hr>
    <button onclick="exportResultsToExcel()">📁 Export Results</button>
    <button onclick="showVoters()">👁️View Voters</button>
    <button onclick="showCandidates()">👁️View Candidates</button>
    <button onclick="toggleElection()" id="electionBtn"></button>
    <button onclick="reelection()">⭕Re-election</button>
    <button onclick="logout()">Logout</button>

    <hr>
    <div id="adminContent"></div>
    <hr>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
